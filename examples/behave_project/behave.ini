[behave]
format = pretty
outfiles = report.html
paths = features
show_skipped = true
show_timings = true

[behave.formatters]
modern = behave_modern_html_report.formatter:ModernHTMLFormatter
steps = behave_modern_html_report.step_catalog_formatter:StepCatalogFormatter

[behave.userdata]
bmr.title = Behave Project Example
bmr.company = Open Source
bmr.theme = auto
bmr.default_view = dashboard
bmr.show_copy_command = true
bmr.show_environment_vars = true
